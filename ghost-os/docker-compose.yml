version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: ghost-os-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ghost_os
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: ghost-os-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  agent-worker:
    build:
      context: ./apps/agent-worker
      dockerfile: Dockerfile
    container_name: ghost-os-agent-worker
    volumes:
      - ./apps/agent-worker:/app
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      - REDIS_URL=redis://redis:6379/0
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/ghost_os
      - JWT_SECRET=${JWT_SECRET:-ghost-os-dev-secret-change-in-prod}
    env_file:
      - .env

  agent-api:
    build:
      context: ./apps/agent-worker
      dockerfile: Dockerfile
    container_name: ghost-os-agent-api
    command: ["uvicorn", "api:app", "--host", "0.0.0.0", "--port", "8000", "--reload", "--ws", "wsproto"]
    ports:
      - "8000:8000"
    volumes:
      - ./apps/agent-worker:/app
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      - REDIS_URL=redis://redis:6379/0
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/ghost_os
      - JWT_SECRET=${JWT_SECRET:-ghost-os-dev-secret-change-in-prod}
    env_file:
      - .env

  dashboard:
    build:
      context: .
      dockerfile: apps/dashboard/Dockerfile
    container_name: ghost-os-dashboard
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      agent-api:
        condition: service_started
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/ghost_os
      - REDIS_URL=redis://redis:6379/0
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    env_file:
      - apps/dashboard/.env

volumes:
  postgres_data:
